<!DOCTYPE html>
<html>

<head>
  <title>Asepsis GPS</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

  <div id="sidebar">
    <div class="sidebar-logo" style="text-align: center;">
      <img src="logo2.jpg" alt="Asepsis GPS Logo"
        style="max-width: 100%; height: auto; max-height: 50px; object-fit: contain; background: white; padding: 5px; border-radius: 8px;">
    </div>

    <div class="menu-section"> Logística</div>
    <ul class="sidebar-menu">
      <li><button id="btn-nav-rutas" class="active" onclick="mostrarVista('rutas')">🚐 Rutas y Despachos</button></li>
      <li><button id="btn-nav-directorio" onclick="mostrarVista('directorio')">🏥 Centros Médicos</button></li>
      <li><button id="btn-nav-mapa" onclick="mostrarVista('mapa')">🗺️ Seguimiento GPS</button></li>
      <li><button id="btn-nav-historial" onclick="mostrarVista('historial')">📜 Historial de Rutas</button></li>
    </ul>
  </div>

  <div class="main-content">
    <div class="top-header">
      <div class="header-title">
        <div class="icon-title" id="icon-vista-actual">🚚</div>
        <div>
          <h2 id="titulo-vista-actual">Rutas </h2>
          <p id="desc-vista-actual">Gestión de rutas, paradas y despachos</p>
        </div>
      </div>
      <button id="btn-accion-header" class="btn-naranja" onclick="abrirModalAsignar()">
        + Asignar punto de ruta
      </button>
    </div>

    <div class="content-body" id="vista-rutas">
      <div class="table-section">
        <div class="filtros-bar">
          <div class="filtro-item">📅 Hoy</div>
          <div class="filtro-item">Todas las unidades</div>
        </div>
        <div class="table-container">
          <div class="table-scroll">
            <table class="premium-table">
              <thead>
                <tr>
                  <th>UNIDAD</th>
                  <th>CHOFER</th>
                  <th>TIPO</th>
                  <th>AYUDANTE</th>
                  <th>HORARIO</th>
                  <th>DESTINOS</th>
                  <th style="text-align:center;">PARADAS</th>
                  <th>ESTADO</th>
                  <th style="text-align:center;">ACCIÓN</th>
                </tr>
              </thead>
              <tbody id="lista"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="content-body" id="vista-historial" style="display: none;">
      <div class="table-section">
        <div class="table-container">
          <div class="table-scroll">
            <table class="premium-table">
              <thead>
                <tr>
                  <th>FECHA</th>
                  <th>UNIDAD</th>
                  <th>CHOFER</th>
                  <th>AYUDANTE</th>
                  <th>SALIDA</th>
                  <th>REGRESO</th>
                  <th>DESTINOS</th>
                  <th style="text-align:center;">PARADAS</th>
                </tr>
              </thead>
              <tbody id="lista-historial"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="content-body" id="vista-mapa" style="display: none; padding: 0;">
      <div class="map-section" style="width: 100%; border-radius: 0; border: none;">
        <div id="map"></div>
      </div>
    </div>

    <div class="content-body" id="vista-directorio" style="display: none; gap: 20px;">
      <div style="width: 350px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); padding: 25px; display: flex; flex-direction: column;">
        <h3 id="form-centro-titulo" style="margin-top: 0; color: white; margin-bottom: 20px; font-size: 18px;">Nuevo Centro Médico</h3>
        <input type="hidden" id="editandoCentroId" value="">
        <input type="text" id="nuevoCentroNombre" class="input-modern" placeholder="Nombre (ej. Clínica San Pablo)">
        <input type="text" id="nuevoCentroDir" class="input-modern" placeholder="Dirección exacta">
        <label class="form-group-label">Tipo de Centro</label>
        <div class="tipo-selector-container" style="display: flex; gap: 8px; margin-bottom: 20px;">
          <input type="hidden" id="nuevoCentroTipo" value="">
          <button type="button" class="btn-tipo" onclick="seleccionarTipo('hospital')" id="btn-tipo-hospital" style="flex: 1; padding: 12px 5px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 11px; font-weight: 600; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; font-family: 'Inter';">
            <span style="font-size: 18px;">🏥</span> Hospital
          </button>
          <button type="button" class="btn-tipo" onclick="seleccionarTipo('clinica')" id="btn-tipo-clinica" style="flex: 1; padding: 12px 5px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 11px; font-weight: 600; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; font-family: 'Inter';">
            <span style="font-size: 18px;">🩺</span> Clínica
          </button>
          <button type="button" class="btn-tipo" onclick="seleccionarTipo('particular')" id="btn-tipo-particular" style="flex: 1; padding: 12px 5px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-muted); cursor: pointer; font-size: 11px; font-weight: 600; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; font-family: 'Inter';">
            <span style="font-size: 18px;">🏠</span> Particular
          </button>
        </div>
        <button onclick="guardarCentro()" class="btn-naranja" style="justify-content: center; width: 100%; margin-top: auto; padding: 12px;">+ Guardar Centro</button>
        <button onclick="limpiarFormularioCentro()" class="btn-action" style="width: 100%; margin-top: 10px; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); border-radius: 6px; padding: 10px;">Cancelar Limpiar</button>
      </div>
      <div class="table-container" style="flex: 1; padding: 25px; display: flex; flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3 style="margin: 0; color: white; font-size: 18px;">Directorio de Centros</h3>
          <input type="text" id="buscarEnDirectorio" class="input-modern" oninput="filtrarDirectorio()" placeholder="🔍 Buscar centro..." style="width: 300px; margin: 0;">
        </div>
        <div id="lista-centros-inline" class="table-scroll"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="/socket.io/socket.io.js"></script>

  <script>
    const map = L.map('map', { zoomControl: false }).setView([-12.0852, -76.9772], 14);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png').addTo(map);

    const socket = io();
    const markers = {};
    const rutasLines = {};
    const stopsMarkers = {};
    const centrosMarkers = {};
    let listaCentrosGlobal = [];

    const getIcon = (tipoRaw) => {
      const tipo = (tipoRaw || 'clinica').toLowerCase().trim();
      let emoji = "🚐";
      if (tipo === "moto") emoji = "🏍️";
      if (tipo === "camion") emoji = "🚛";
      if (tipo === "hospital") emoji = "🏥";
      if (tipo === "clinica") emoji = "🩺";
      if (tipo === "particular") emoji = "🏠";

      let bg = "linear-gradient(135deg, var(--accent-teal), #3b82f6)";
      if (tipo === "hospital") bg = "linear-gradient(135deg, #ef4444, #b91c1c)";
      if (tipo === "clinica") bg = "linear-gradient(135deg, #3b82f6, #1d4ed8)";
      if (tipo === "particular") bg = "linear-gradient(135deg, #f59e0b, #d97706)";

      return L.divIcon({
        className: 'custom-div-icon',
        html: `<div class="marker-pin" style="background: ${bg}"></div><div class="marker-icon">${emoji}</div>`,
        iconSize: [30, 42], iconAnchor: [15, 42], popupAnchor: [0, -35]
      });
    };

    async function cargar() {
      await cargarCentros();
      const res = await fetch('/api/vehiculos');
      actualizar(await res.json());
    }

    socket.on("actualizarMapa", actualizar);
    socket.on("actualizarCentros", cargarCentros);

    async function cargarCentros() {
      const res = await fetch('/api/centros');
      listaCentrosGlobal = await res.json();
      Object.values(centrosMarkers).forEach(m => map.removeLayer(m));
      listaCentrosGlobal.forEach(c => {
        centrosMarkers[c._id] = L.marker([c.lat, c.lng], { icon: getIcon(c.tipo) }).addTo(map)
          .bindPopup(`<b>${c.nombre}</b><br>${c.direccion}`);
      });
      renderDirectorio();
    }

    async function cargarHistorial() {
      const res = await fetch('/api/historial');
      const data = await res.json();
      const tbody = document.getElementById('lista-historial');
      tbody.innerHTML = '';
      data.forEach(h => {
        tbody.innerHTML += `
          <tr>
            <td>${h.fecha}</td>
            <td><b>${h.placa}</b></td>
            <td>${h.chofer}</td>
            <td>${h.ayudante || '-'}</td>
            <td>${h.horaSalida}</td>
            <td>${h.horaRegreso}</td>
            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${h.centros.join(', ')}">${h.centros.join(', ')}</td>
            <td style="text-align:center;"><b>${h.totalParadas}</b></td>
          </tr>
        `;
      });
    }

    function mostrarVista(vista) {
      document.getElementById('vista-rutas').style.display = vista === 'rutas' ? 'flex' : 'none';
      document.getElementById('vista-directorio').style.display = vista === 'directorio' ? 'flex' : 'none';
      document.getElementById('vista-mapa').style.display = vista === 'mapa' ? 'flex' : 'none';
      document.getElementById('vista-historial').style.display = vista === 'historial' ? 'flex' : 'none';

      document.getElementById('btn-nav-rutas').classList.toggle('active', vista === 'rutas');
      document.getElementById('btn-nav-directorio').classList.toggle('active', vista === 'directorio');
      document.getElementById('btn-nav-mapa').classList.toggle('active', vista === 'mapa');
      document.getElementById('btn-nav-historial').classList.toggle('active', vista === 'historial');

      const btnHeader = document.getElementById('btn-accion-header');
      if (vista === 'rutas') {
        document.getElementById('titulo-vista-actual').innerText = "Rutas";
        document.getElementById('desc-vista-actual').innerText = "Gestión de rutas y despachos";
        document.getElementById('icon-vista-actual').innerText = "🚚";
        btnHeader.style.display = 'flex';
        btnHeader.innerText = "+ Asignar punto de ruta";
        btnHeader.onclick = abrirModalAsignar;
      } else if (vista === 'historial') {
        document.getElementById('titulo-vista-actual').innerText = "Historial";
        document.getElementById('desc-vista-actual').innerText = "Rutas completadas anteriormente";
        document.getElementById('icon-vista-actual').innerText = "📜";
        btnHeader.style.display = 'none';
        cargarHistorial();
      } else if (vista === 'directorio') {
        btnHeader.style.display = 'none';
      }

      if (vista === 'mapa') setTimeout(() => map.invalidateSize(), 100);
    }

    let lastVehiculosData = [];
    function actualizar(data) {
      lastVehiculosData = data;
      const tbody = document.getElementById("lista");
      tbody.innerHTML = "";
      
      data.sort((a, b) => {
        const aR = a.ruta && a.ruta.length > 0 ? 1 : 0;
        const bR = b.ruta && b.ruta.length > 0 ? 1 : 0;
        return bR - aR || a.placa.localeCompare(b.placa);
      });

      const select = document.getElementById("vehiculoSelect");
      if (select.options.length <= 1) {
        data.forEach(v => select.innerHTML += `<option value="${v._id}">${v.placa} (${v.chofer})</option>`);
      }

      data.forEach(v => {
        const lat = v.latitud || -12.0852; const lng = v.longitud || -76.9772;
        if (!markers[v._id]) markers[v._id] = L.marker([lat, lng], { icon: getIcon(v.tipo) }).addTo(map);
        else markers[v._id].setLatLng([lat, lng]);

        if (stopsMarkers[v._id]) stopsMarkers[v._id].forEach(m => map.removeLayer(m));
        stopsMarkers[v._id] = [];

        if (v.ruta && v.ruta.length > 0) {
          const pendientes = v.ruta.filter(r => r.estado !== 'completado');
          const pts = [[lat, lng], ...pendientes.map(p => [p.lat, p.lng])];
          if (!rutasLines[v._id]) rutasLines[v._id] = L.polyline(pts, { color: "#06b6d4", weight: 4 }).addTo(map);
          else rutasLines[v._id].setLatLngs(pts);

          let count = 1;
          v.ruta.forEach(p => {
            if (!p.esParadaPrincipal) return;
            const stop = L.marker([p.lat, p.lng], {
              icon: L.divIcon({
                html: `<div style="background:${p.estado === 'completado' ? '#10b981' : '#ef4444'}; color:white; width:22px; height:22px; border-radius:50%; text-align:center; line-height:22px; font-weight:bold; font-size:11px; border:2px solid white;">${count++}</div>`,
                iconSize: [22, 22], iconAnchor: [11, 11]
              })
            }).addTo(map).bindPopup(p.nombre);
            stopsMarkers[v._id].push(stop);
          });
        } else if (rutasLines[v._id]) { map.removeLayer(rutasLines[v._id]); delete rutasLines[v._id]; }

        const enRuta = v.ruta && v.ruta.length > 0;
        const ptsTot = v.ruta ? v.ruta.filter(p => p.esParadaPrincipal).length : 0;
        const ptsDone = v.ruta ? v.ruta.filter(p => p.esParadaPrincipal && p.estado === 'completado').length : 0;
        const destinos = enRuta ? v.ruta.filter(p => p.esParadaPrincipal).map(p => p.nombre).join(', ') : '-';

        const btnSeg = enRuta ? `<button class="btn-action" onclick="mostrarVista('mapa'); setTimeout(() => { map.setView([${lat},${lng}],16); markers['${v._id}'].openPopup(); }, 100); event.stopPropagation();" style="color:var(--accent-teal); background:rgba(6,182,212,0.1);">📍</button>` : '';
        const btnEdit = enRuta ? `<button class="btn-action" onclick="abrirModalEditarRuta('${v._id}'); event.stopPropagation();" style="color:#3b82f6; background:rgba(59,130,246,0.1);">✏️</button>` : '';
        const btnVer = enRuta ? `<button class="btn-action btn-ver-ruta" onclick="abrirVentanaRuta('${v._id}'); event.stopPropagation();">📋</button>` : '';

        tbody.innerHTML += `
          <tr>
            <td><b>${v.placa}</b></td>
            <td style="color:var(--text-muted)">${v.chofer}</td>
            <td style="text-transform:capitalize;">${v.tipo}</td>
            <td>${v.ayudante || '-'}</td>
            <td>${enRuta ? `${v.horaSalida} - ${v.horaRegreso}` : '-'} ${enRuta ? `<span style="cursor:pointer;opacity:0.5;" onclick="abrirModalEditarHorario('${v._id}','${v.horaSalida}','${v.horaRegreso}');event.stopPropagation();">✏️</span>` : ''}</td>
            <td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${destinos}">${destinos}</td>
            <td style="text-align:center;"><b>${enRuta ? `${ptsDone}/${ptsTot}` : '-'}</b></td>
            <td><span class="badge ${enRuta ? 'badge-ruta' : 'badge-libre'}">${enRuta ? 'En Ruta' : 'Libre'}</span></td>
            <td><div style="display:flex; gap:5px; justify-content:center;">${btnVer}${btnEdit}${btnSeg}</div></td>
          </tr>
        `;
      });
    }

    let centrosTemporalesParaAsignar = [];
    function abrirModalAsignar() {
      centrosTemporalesParaAsignar = []; renderizarCentrosTemporales();
      document.getElementById("modal-asignar").style.display = "flex";
      document.getElementById("modal-asignar-titulo").innerText = "Nueva Ruta";
      document.getElementById("vehiculoSelect").disabled = false;
    }

    function renderizarCentrosTemporales() {
      const div = document.getElementById("listaCentrosSeleccionados");
      div.innerHTML = "";
      centrosTemporalesParaAsignar.forEach((c, i) => {
        div.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; background:rgba(0,0,0,0.2); margin-bottom:4px; border-radius:4px; font-size:12px;"><span><b>${i+1}.</b> ${c.nombre}</span><button onclick="removerCentroTemporal('${c._id}')" style="background:none;border:none;color:#ef4444;cursor:pointer;">✖</button></div>`;
      });
    }

    function removerCentroTemporal(id) { centrosTemporalesParaAsignar = centrosTemporalesParaAsignar.filter(c => c._id !== id); renderizarCentrosTemporales(); }

    function filtrarCentros() {
      const q = document.getElementById("buscadorCentro").value.toLowerCase();
      const sug = document.getElementById("sugerenciasCentros");
      if (!q) { sug.style.display = "none"; return; }
      const fil = listaCentrosGlobal.filter(c => c.nombre.toLowerCase().includes(q));
      sug.innerHTML = "";
      fil.forEach(c => {
        const d = document.createElement("div"); d.style.padding = "10px"; d.style.cursor = "pointer";
        d.innerHTML = `<b>${c.nombre}</b><br><small>${c.direccion}</small>`;
        d.onclick = () => { if(centrosTemporalesParaAsignar.length < 7) { centrosTemporalesParaAsignar.push(c); renderizarCentrosTemporales(); document.getElementById("buscadorCentro").value=""; sug.style.display="none"; } };
        sug.appendChild(d);
      });
      sug.style.display = fil.length ? "block" : "none";
    }

    async function asignarRutaYcerrar() {
      const vId = document.getElementById("vehiculoSelect").value;
      const payload = { centros: centrosTemporalesParaAsignar, ayudante: document.getElementById("inputAyudante").value, horaSalida: document.getElementById("inputHoraSalida").value, horaRegreso: document.getElementById("inputHoraRegreso").value, observaciones: document.getElementById("inputObservaciones").value };
      await fetch(`/api/vehiculos/${vId}/ruta`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      document.getElementById("modal-asignar").style.display = "none";
    }

    cargar();
    setInterval(cargar, 5000);
  </script>

  <!-- MODALES (Asignar, Ruta, Horario) -->
  <div id="modal-asignar" class="modal-overlay">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-header">
        <h3 id="modal-asignar-titulo">Asignar Ruta</h3>
        <button onclick="document.getElementById('modal-asignar').style.display='none'" class="btn-close">✖</button>
      </div>
      <div class="modal-body">
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:15px;">
           <div><label class="form-group-label">Hora Salida</label><input type="time" id="inputHoraSalida" class="input-modern" value="06:00"></div>
           <div><label class="form-group-label">Regreso Est.</label><input type="time" id="inputHoraRegreso" class="input-modern" value="14:00"></div>
           <div><label class="form-group-label">Unidad</label><select id="vehiculoSelect" class="input-modern"><option value="">Selecciona...</option></select></div>
        </div>
        <div style="position:relative;">
          <label class="form-group-label">Buscar Destinos</label>
          <input type="text" id="buscadorCentro" class="input-modern" oninput="filtrarCentros()" placeholder="Escribe nombre del centro...">
          <div id="sugerenciasCentros" style="display:none; position:absolute; width:100%; background:var(--bg-card); z-index:100; border:1px solid var(--border-color); max-height:150px; overflow-y:auto;"></div>
        </div>
        <div id="listaCentrosSeleccionados" style="margin-bottom:15px;"></div>
        <div style="display:grid; grid-template-columns: 1fr 2fr; gap:10px;">
           <div><label class="form-group-label">Ayudante</label><select id="inputAyudante" class="input-modern"><option value="">Sin ayudante...</option></select></div>
           <div><label class="form-group-label">Obs.</label><input type="text" id="inputObservaciones" class="input-modern"></div>
        </div>
      </div>
      <div class="modal-footer"><button onclick="asignarRutaYcerrar()" class="btn-naranja" style="width:100%; justify-content:center;">🚀 Despachar Ruta</button></div>
    </div>
  </div>

  <div id="modal-ruta" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header"><h3>Ruta Actual</h3><button onclick="document.getElementById('modal-ruta').style.display='none'" class="btn-close">✖</button></div>
      <div id="modal-ruta-lista" class="modal-body"></div>
    </div>
  </div>

  <script>
    async function cargarAyudantes() {
      const res = await fetch("/api/ayudantes");
      const data = await res.json();
      const sel = document.getElementById("inputAyudante");
      sel.innerHTML = '<option value="">Sin ayudante...</option>';
      data.forEach(a => sel.innerHTML += `<option value="${a.nombre}">${a.nombre}</option>`);
    }
    cargarAyudantes();
    
    function abrirVentanaRuta(id) {
       const v = lastVehiculosData.find(veh => veh._id === id);
       let html = '';
       v.ruta.filter(p => p.esParadaPrincipal).forEach((p, i) => {
         html += `<div style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; opacity:${p.estado === 'completado' ? 0.5 : 1}"><span><b>${i+1}.</b> ${p.nombre}</span><span>${p.estado === 'completado' ? '✅' : '🔴'}</span></div>`;
       });
       document.getElementById("modal-ruta-lista").innerHTML = html;
       document.getElementById("modal-ruta").style.display = "flex";
    }
  </script>

</body>
</html>
